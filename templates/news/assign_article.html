{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Assign Article</h2>
    <p><strong>{{ article.title }}</strong></p>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                {{ field.label_tag }}
                {{ field }}
                {% for error in field.errors %}
                    <div class="text-danger">{{ error }}</div>
                {% endfor %}
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-primary">Save Assignment</button>
        <a href="{% url 'editor_dashboard' %}" class="btn btn-secondary">Back</a>
    </form>
</div>
{% endblock %}
