{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <!-- Article Card -->
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">{{ article.title }}</h3>
                    <small>
                        By {{ article.author.username }} |
                        {{ article.created_at|date:"F j, Y, g:i A" }}
                    </small>
                </div>
                <div class="card-body">
                    <p class="card-text">{{ article.content|linebreaks }}</p>
                </div>
                <div class="card-footer text-end">
                    <a href="{% url 'edit_article' article.pk %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'delete_article' article.pk %}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this article?');">Delete</a>
                    <a href="{% url 'article_list' %}" class="btn btn-sm btn-secondary">Back</a>
                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
