{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <div class="row justify-content-center">
        <div class="col-md-9">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h2 class="card-title mb-2">
                        📬 {{ newsletter.title }}
                    </h2>

                    <p class="text-muted mb-4">
                        By <strong>{{ newsletter.journalist.username }}</strong>
                        · Publisher: <strong>{{ newsletter.publisher.name }}</strong>
                    </p>

                    <hr>

                    <div class="newsletter-content mb-4">
                        <p>{{ newsletter.content|linebreaks }}</p>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">

                        {% if user == newsletter.journalist %}
                            <a href="{% url 'edit_newsletter' newsletter.pk %}" class="btn btn-warning">
                                ✏️ Edit
                            </a>

                            <a href="{% url 'delete_newsletter' newsletter.pk %}"
                               class="btn btn-danger"
                               onclick="return confirm('Are you sure you want to delete this newsletter?');">
                                🗑 Delete
                            </a>
                        {% endif %}

                        <a href="{% url 'home' %}" class="btn btn-secondary ms-auto">
                            ← Back to Home
                        </a>

                    </div>

                </div>
            </div>

        </div>
    </div>

</div>
{% endblock %}
