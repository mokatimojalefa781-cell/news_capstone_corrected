{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News Platform</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="{% url 'home' %}">📰 News</a>

    <div>
        <a class="{% if request.path == '/' %}active{% endif %}"
           href="{% url 'home' %}">
           Home
        </a>

        <a class="{% if '/articles/' in request.path %}active{% endif %}"
           href="{% url 'article_list' %}">
           Articles
        </a>

        <a class="{% if '/publishers/' in request.path %}active{% endif %}"
           href="{% url 'publisher_list' %}">
           Publishers
        </a>

        {% if user.is_authenticated %}
            <span>Hello, {{ user.username }}</span>
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </div>
</nav>

<!-- PAGE CONTENT -->
<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    © 2026 News Application | Django Project
</footer>

</body>
</html>
